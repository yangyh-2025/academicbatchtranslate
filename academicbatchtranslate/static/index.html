<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>AcademicBatchTranslate v2.0 - 学术论文批量翻译</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #faf9f7 0%, #f5f3f5 100%);
        }
        body {
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            max-width: 600px;
            padding: 2rem;
        }
        .logo {
            font-size: 3rem;
            font-weight: 700;
            color: #FFB300;
            margin-bottom: 2rem;
        }
        .app-frame {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
        }
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #FFC107;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        .success-box {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            animation: slideUp 0.5s ease-out;
        }
        .error-box {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            border-left: 4px solid #F44336;
        }
        h1 {
            color: #292524;
            margin-bottom: 0.5rem;
            font-size: 1.5rem;
        }
        p {
            color: #5c5a58;
            margin: 0.5rem 0 0.5rem;
            line-height: 1.6;
        }
        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
        }
        .btn-primary {
            background: #FFB300;
            color: white;
        }
        .btn-primary:hover {
            background: #FFA000;
        }
        .btn-secondary {
            background: #f5f3f5;
            color: #292524;
        }
        .progress-text {
            color: #5c5a58;
            font-size: 0.875rem;
            margin-top: 0.5rem;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @key {
            0% {
                transform: rotate(-30deg);
            transform-origin: center center;
            }
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loading-overlay">
        <div class="loading-spinner"></div>
        <p class="progress-text" id="loading-text">正在启动应用...</p>
    </div>

    <div class="container" id="="main-container" style="display: none;">
        <div class="logo">AcademicBatchTranslate</div>
        <h1>v2.0</h1>
        <p>现代 React 前端已就绪</p>

        <iframe id="app-frame" class="app-frame" src="/frontend/index.html" sandbox="allow-same-origin allow-scripts"></iframe>
    </div>

    <div class="success-box" id="success-box" style="display: none;">
        <h2>启动成功</h2>
        <p>新前端应用已成功集成</p>
        <div style="margin-top: 1.5rem;">
            <button class="btn btn-primary" onclick="enterApp()">进入应用</button>
        </div>
    </div>

    <div class="error-box" id="error-box" style="display: none;">
        <h2 style="display: flex; align-items: center; gap: 0.5rem;">
            <span>⚠️</span>
            <span>加载失败</span>
        </h2>
        <p>无法连接到前端应用</p>
        <div style="margin-top: 1.5rem;">
            <p>可能的原因：</p>
            <p style="margin-bottom: 0.5rem;">1. 前端构建未完成</p>
            <p style="margin-bottom: 0.5rem;">2. 浏览器阻止了iframe加载</p>
            <p style="margin-bottom: 0.5rem;">3. 网络连接问题</p>
        </div>
        <div style="margin-top: 1.5rem;">
            <button class="btn btn-secondary" onclick="location.reload()">重新加载</button>
        </div>
    </div>

    <script>
        const FRONTEND_URL = '/frontend/index.html';
        const MAX_RETRIES = 5;
        const RETRY_DELAY = 2000;

        let retries = 0;
        let loadingInterval;
        let progressPercent = 0;

        function startProgress() {
            const overlay = document.getElementById('loading-overlay');
            const container = document.getElementById('loading-overlay');
            const text = document.getElementById('loading-text');

            overlay.style.display = 'flex';
            progressPercent = 0;
            loadingInterval = setInterval(() => {
                progressPercent += 2;
                if (progressPercent > 100) progressPercent = 100;
                text.textContent = `正在启动应用... ${progressPercent}%`;
            }, 100);
        }

        function stopProgress() {
            if (loadingInterval) {
                clearInterval(loadingInterval);
                loadingInterval = null;
            }
            const overlay = document.getElementById('loading-overlay');
            overlay.style.display = 'none';
        }

        function showMain() {
            const overlay = document.getElementById('loading-overlay');
            const mainContainer = document.getElementById('main-container');

            overlay.style.display = 'none';
            mainContainer.style.display = 'block';
        }

        function showSuccess() {
            stopProgress();
            const mainContainer = document.getElementById('main-container');
            const successBox = document.getElementById('success-box');

            if (mainContainer) {
                mainContainer.style.display = 'none';
            }
            successBox.style.display = 'block';
        }

        function showError() {
            stopProgress();
            const mainContainer = document.getElementById('main-container');
            const errorBox = document.getElementById('error-box');

            if (mainContainer) {
                mainContainer.style.display = 'none';
            }
            errorBox.style.display = 'block';
        }

        function enterApp() {
            window.location.href = '/frontend/index.html';
        }

        // 检测前端是否可访问
        async function checkFrontendReady() {
            for (let i = 0; i < MAX_RETRIES; i++) {
                try {
                    const response = await fetch(FRONTEND_URL, {
                        method: 'HEAD',
                        cache: 'no-cache'
                    });

                    if (response.ok) {
                        console.log('Frontend is ready!');
                        return true;
                    }

                    // 等待重试
                    await new Promise(resolve => setTimeout(resolve, RETRY_DELAY));
                } catch (error) {
                    console.error('Frontend check failed:', error);
                }
            }
            return false;
        }

        // 页面加载完成后自动开始
        window.addEventListener('DOMContentLoaded', async () => {
            // 启动进度动画
            startProgress();

            // 延迟一小段时间再开始检查
            setTimeout(async () => {
                const isReady = await checkFrontendReady();

                if (isReady) {
                    stopProgress();
                    showSuccess();
                } else {
                    showError();
                }
            }, 500);
        });
    </script>
</body>
</html>
